run_name: OLMo-60M-ce-1024-attn-ssm-yarn-c4
seed: 6198
dry_run: false

swanlab:
  entity: todo
  name: ${run_name}
  project: olmo-fope

model:
  d_model: 512
  n_heads: 8
  n_layers: 8
  mlp_ratio: 8
  weight_tying: false
  alibi: false
  rope: true
  rope_variant: attn_ssm
  fourier: false
  len_extra: false
  flash_attention: true
  attention_dropout: 0.0
  attention_layer_norm: false
  clip_qkv: null
  include_bias: false
  block_type: sequential
  layer_norm_type: rms
  layer_norm_with_affine: true
  layer_norm_eps: 1e-6
  bias_for_layer_norm: false
  attention_layer_norm_with_affine: false
  activation_type: swiglu
  residual_dropout: 0.0
  embedding_dropout: 0.0
  max_sequence_length: 1024
  vocab_size: 50280
  embedding_size: 50304
  eos_token_id: 0
  pad_token_id: 1
  init_device: cuda
  init_fn: normal
  init_std: 0.001
  init_cutoff_factor: 3
  attn_ssm_tau_min: 8.0
  attn_ssm_tau_ratio: 1
  attn_ssm_pair_tau_ratio: 0.95
  attn_ssm_tau_max: null
  attn_ssm_disparity_eta: 1.0
  attn_ssm_learn_eta: false
  attn_ssm_exp_clip: 20.0
  attn_ssm_center_positions: true
  attn_ssm_sink_no_decay: false
  attn_ssm_sink_no_decay_mode: approx

ddp:
  grad_sync_mode: batch
  find_unused_params: false

compile: null

optimizer:
  name: adamw
  learning_rate: 6.0e-4
  weight_decay: 0.1
  eps: 1e-8
  decay_norm_and_bias: true
  decay_embeddings: true
  betas:
  - 0.9
  - 0.95
  metrics_log_interval: 10

scheduler:
  name: cosine_with_warmup
  t_warmup: 10000
  alpha_f: 0.1
  warmup_min_lr: 0

tokenizer:
  identifier: tokenizers/allenai_gpt-neox-olmo-dolma-v1_5.json
  truncate_direction: right

save_folder: workspace/${run_name}
remote_save_folder: null
save_overwrite: true

# Unsharded checkpoints (for ddp)
save_interval_unsharded: 10
save_num_unsharded_checkpoints_to_keep: -1

load_path: null

max_duration: 1ep
global_train_batch_size: 1024
device_train_microbatch_size: 64

precision: amp_bf16
distributed_strategy: ddp

gen1_gc_interval: 1

max_grad_norm: 1.0
max_grad_norm_ratio: null

speed_monitor:
  window_size: 20

eval_interval: 10
eval_subset_num_batches: -1
device_eval_batch_size: ${device_train_microbatch_size}
